name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build Flutter App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

      # Crea el archivo .env.prod.json desde GitHub Secrets en tiempo de CI
      - name: Create Firebase env file
        run: |
          cat > .env.prod.json << EOF
          {
            "FIREBASE_ANDROID_API_KEY": "${{ secrets.FIREBASE_ANDROID_API_KEY }}",
            "FIREBASE_ANDROID_APP_ID": "${{ secrets.FIREBASE_ANDROID_APP_ID }}",
            "FIREBASE_MESSAGING_SENDER_ID": "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            "FIREBASE_PROJECT_ID": "${{ secrets.FIREBASE_PROJECT_ID }}",
            "FIREBASE_STORAGE_BUCKET": "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            "FIREBASE_IOS_API_KEY": "${{ secrets.FIREBASE_IOS_API_KEY }}",
            "FIREBASE_IOS_APP_ID": "${{ secrets.FIREBASE_IOS_APP_ID }}",
            "FIREBASE_IOS_BUNDLE_ID": "${{ secrets.FIREBASE_IOS_BUNDLE_ID }}",
            "FIREBASE_WEB_API_KEY": "${{ secrets.FIREBASE_WEB_API_KEY }}",
            "FIREBASE_WEB_APP_ID": "${{ secrets.FIREBASE_WEB_APP_ID }}",
            "FIREBASE_AUTH_DOMAIN": "${{ secrets.FIREBASE_AUTH_DOMAIN }}"
          }
          EOF

      - name: Build APK (production)
        run: flutter build apk --dart-define-from-file=.env.prod.json
