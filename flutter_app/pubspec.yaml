name: flutter_app
description: "CronogramaActividades - Task Calendar App with Google Calendar sync"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ======== State Management ========
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0

  # ======== Dependency Injection ========
  get_it: ^9.2.1
  injectable: ^3.0.0

  # ======== Networking & API ========
  dio: ^5.8.0
  connectivity_plus: ^7.1.1

  # ======== Firebase ========
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0

  # ======== Google Services ========
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0

  # ======== Navigation ========
  auto_route: ^11.1.0

  # ======== Functional Programming & Data ========
  fpdart: ^1.1.0
  equatable: ^2.0.7

  # ======== Code Generation Annotations ========
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # ======== Local Storage ========
  shared_preferences: ^2.5.3
  hive_flutter: ^1.1.0

  # ======== UI Components ========
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  flutter_slidable: ^4.0.3

  # ======== Date & Time ========
  intl: ^0.20.2
  table_calendar: ^3.2.0

  # ======== Utilities ========
  uuid: ^4.5.1
  logger: ^2.6.0
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ======== Code Generation ========
  build_runner: ^2.4.15
  freezed: ^3.2.5
  json_serializable: ^6.9.5
  injectable_generator: ^3.0.2
  auto_route_generator: ^10.0.0

  # ======== Testing ========
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^4.1.0+1
  firebase_auth_mocks: ^0.15.0

  # ======== Linting ========
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
